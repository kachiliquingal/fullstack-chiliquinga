version: "3.8"

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: appdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    image: kachiliquingal/fullstack-backend:${BACKEND_TAG:-latest}
    restart: always
    depends_on:
      - db
    ports:
      - "3000:3000"

  frontend:
    image: kachiliquingal/fullstack-frontend:${FRONTEND_TAG:-latest}
    restart: always
    depends_on:
      - backend
    ports:
      - "8081:80"

volumes:
  pgdata:
